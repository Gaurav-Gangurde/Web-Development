<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List and Tables</title>
</head>

<body>
    <b>
        <li>This is a Unordered list</li>
    </b>
    <ul type="squ">

        <li>Gaurav Gangurde</li>
        <li>Mukesh Chaudhary</li>
        <li>Swapnil Badgujar</li>
    </ul>
    <b>
        <li>This is a Ordered list</li>
    </b>
    <ol type="I">

        <li>Rushikesh Patil</li>
        <li>Shubham Patil</li>
        <li>Karan Chavan</li>
    </ol>
    <h3>HTML Table</h3>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>RollNo</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Gaurav</td>
                <td>453</td>
                <td>99%</td>
            </tr>
            <tr>
                <td>Mukesh</td>
                <td>477</td>
                <td>78%</td>
            </tr>
            <tr>
                <td>Swapnil</td>
                <td>892</td>
                <td>56%</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
